spring.application.name=bookstore-backend

spring.output.ansi.enabled=always

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/tmdt_bookstore?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=21082004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.security.jwt.secret=change-this-to-a-very-long-strong-secret-key-for-jwt-signing-2026
app.security.jwt.expiration-minutes=1440

# Server port
server.port=8080

# CORS (handled in code, this is just for reference)
# Frontend runs on http://localhost:5173
# K?ch thu?c payload t?i da cho base64 image
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB

